name: subtitle2-selfhosted-cicd

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: [self-hosted, linux]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: |
            frontend/package-lock.json
            backend/package-lock.json

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Install backend deps
        working-directory: backend
        run: npm ci

      - name: Build backend
        working-directory: backend
        run: npm run build

      - name: Deploy
        env:
          TARGET_USER: winben
          BACKEND_DEPLOY_ROOT: /home/winben/subtitle2
          FRONTEND_WEB_ROOT: /var/www/html
          PM2_APP_NAME: subtitle2
        run: bash scripts/deploy-selfhosted.sh
