name: subtitle2-selfhosted-cicd

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: [self-hosted, linux]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: |
            frontend/package-lock.json
            backend/package-lock.json

      - name: Verify Node Version
        run: |
          node -v
          npm -v
          test "$(node -p 'process.versions.node.split(`.`)[0]')" = "24"

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Frontend unit tests
        working-directory: frontend
        run: npm test -- --watch=false

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Install backend deps
        working-directory: backend
        run: npm ci

      - name: Backend unit tests
        working-directory: backend
        run: npm test -- --runInBand

      - name: Build backend
        working-directory: backend
        run: npm run build

      - name: Deploy
        env:
          TARGET_USER: winben
          BACKEND_DEPLOY_ROOT: /home/winben/subtitle2
          FRONTEND_WEB_ROOT: /var/www/html
          PM2_APP_NAME: subtitle2
        run: bash scripts/deploy-selfhosted.sh

      - name: Purge Cloudflare Cache
        if: ${{ success() && secrets.CLOUDFLARE_API_TOKEN != '' && secrets.CLOUDFLARE_ZONE_ID != '' }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
        run: |
          RESPONSE="$(
            curl -sS -X POST "https://api.cloudflare.com/client/v4/zones/${CLOUDFLARE_ZONE_ID}/purge_cache" \
              -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
              -H "Content-Type: application/json" \
              --data '{"purge_everything":true}'
          )"

          echo "$RESPONSE"
          echo "$RESPONSE" | grep -q '"success":true' || {
            echo "HIBA: Cloudflare cache purge sikertelen."
            exit 1
          }
